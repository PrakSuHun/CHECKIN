<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROGEN | 현장 출석체크</title>

<!-- 폰트 및 라이브러리 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Pretendard', 'sans-serif'] },
      colors: {
        ai: {
          dark: '#05070A', card: '#111827', primary: '#6366F1', secondary: '#8B5CF6', accent: '#10B981',
        }
      }
    }
  }
}
</script>
<style>
  body { 
    background-color: #F8FAFC; 
    background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.08), transparent 50%), radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.08), transparent 50%);
    background-attachment: fixed;
    color: #111827; 
    -webkit-font-smoothing: antialiased; 
    word-break: keep-all; 
    letter-spacing: -0.02em; 
  }
  .glass { 
    background: rgba(255, 255, 255, 0.9); 
    backdrop-filter: blur(16px); 
    border: 1px solid rgba(255, 255, 255, 1); 
    box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.05), 0 8px 10px -6px rgba(99, 102, 241, 0.02);
  }
  .input-field { 
    width: 100%; 
    background: #F9FAFB; 
    border: 1px solid #E5E7EB; 
    border-radius: 0.75rem; 
    padding: 0.875rem 1rem; 
    color: #1F2937; 
    transition: all 0.3s; 
  }
  .input-field:focus { 
    outline: none; 
    border-color: #6366F1; 
    background: #FFFFFF; 
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); 
  }
  .input-field::placeholder { color: #9CA3AF; }
  .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="selection:bg-ai-primary selection:text-white pb-20 h-screen flex flex-col">

<!-- 네비게이션 바 -->
<nav class="w-full glass border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-3xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="#" class="font-black text-2xl italic flex items-center">
      <span class="text-gray-900 tracking-tight uppercase">PRO</span><span class="text-ai-primary tracking-tight uppercase">GEN</span>
    </a>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<main class="max-w-xl mx-auto px-6 pt-12 flex-1 flex flex-col justify-center w-full mt-[-64px]">
  
  <div class="text-center mb-10">
    <div class="inline-block px-3 py-1 mb-3 rounded-full bg-indigo-50 border border-indigo-100 text-ai-primary text-sm font-bold tracking-wide shadow-sm">
      <i class="fa-solid fa-qrcode mr-1"></i> 현장 입장
    </div>
    <h1 class="text-3xl md:text-4xl font-black mb-4 text-gray-900">출석 체크</h1>
    <p class="text-gray-500 text-sm md:text-base">빠른 입장을 위해 신청하신 이름을 입력해 주세요.</p>
  </div>

  <div class="glass p-6 md:p-8 rounded-3xl space-y-6">
    <div>
      <label class="block text-sm font-bold text-gray-700 mb-2" for="userName">이름 <span class="text-red-500">*</span></label>
      <input type="text" id="userName" placeholder="예: 홍길동" class="input-field text-lg text-center" onkeypress="if(event.key === 'Enter') checkAttendance()">
    </div>
  </div>

  <button type="button" onclick="checkAttendance()" id="submitBtn" class="w-full py-5 bg-gradient-to-r from-ai-primary to-ai-secondary text-white font-black text-xl rounded-2xl hover:shadow-[0_10px_30px_rgba(99,102,241,0.3)] transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 mt-6">
    <span id="btnText">출석 확인하기</span>
    <div id="btnLoader" class="loader" style="width:20px;height:20px;border-width:2.5px;"></div>
  </button>
  
</main>

<!-- 결과 모달 (팝업창) -->
<div id="resultModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/70 backdrop-blur-sm px-4 opacity-0 transition-opacity duration-300">
  <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl transform transition-all scale-95 duration-300 border border-gray-100 relative overflow-hidden" id="modalContent">
    
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-ai-primary to-ai-secondary" id="modalTopLine"></div>

    <div id="modalIconBox" class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-indigo-100">
      <i id="modalIcon" class="fa-solid fa-face-smile text-3xl text-ai-primary"></i>
    </div>
    
    <h3 id="modalTitle" class="text-2xl font-black text-gray-900 mb-2">환영합니다!</h3>
    <p id="modalMessage" class="text-gray-500 text-sm mb-6 leading-relaxed">
      자리를 확인 후 착석해 주세요.
    </p>
    
    <!-- 팀 안내 박스 -->
    <div id="teamInfoBox" class="bg-indigo-50 rounded-xl p-4 mb-6 border border-indigo-100 hidden">
      <p class="text-sm font-bold text-ai-primary mb-1">🎯 배정된 팀</p>
      <p class="text-3xl font-black text-gray-900"><span id="teamNumberDisplay"></span>팀</p>
    </div>
    
    <button type="button" onclick="closeModal()" id="closeModalBtn" class="w-full py-4 bg-gray-900 text-white font-black text-lg rounded-xl hover:bg-black transition-all flex items-center justify-center gap-2 shadow-lg mb-2">
      확인 (창 닫기)
    </button>
  </div>
</div>

<script>
  // ✅ 실제 Vercel API와 통신하는 핵심 함수
  async function checkAttendance() {
    const nameInput = document.getElementById('userName').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    // 빈 값 체크
    if (!nameInput) {
        alert("이름을 입력해주세요!");
        document.getElementById('userName').focus();
        return;
    }

    // 로딩 UI 시작
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
    btnText.innerText = '명단 확인 중...';
    btnLoader.style.display = 'block';

    try {
        // 🚀 Vercel에 배포된 API 라우트로 POST 요청 (이름 전송)
        const response = await fetch('/api/check-attendance', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ name: nameInput })
        });

        // 서버 응답 파싱
        const data = await response.json();

        // 성공 여부에 따른 모달 창 띄우기
        if (response.ok && data.success) {
            // 통신 성공 & 명단에 존재: 성공 팝업 및 팀 번호 출력
            showModal(true, nameInput, data.team);
        } else {
            // 명단에 없음 또는 기타 API 에러: 실패 팝업 출력
            console.error('서버 응답 에러:', data.message);
            showModal(false, nameInput, null);
        }
    } catch (error) {
        console.error('API 통신 에러:', error);
        alert('서버와 통신 중 문제가 발생했습니다. 현장 스태프에게 문의해주세요.');
    } finally {
        // 로딩 UI 종료 및 초기화
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        btnText.innerText = '출석 확인하기';
        btnLoader.style.display = 'none';
        document.getElementById('userName').value = '';
    }
  }

  // 모달(팝업) 띄우는 함수 - 성공/실패에 따라 디자인이 변합니다.
  function showModal(isSuccess, name, team) {
    const modal = document.getElementById('resultModal');
    const content = document.getElementById('modalContent');
    const iconBox = document.getElementById('modalIconBox');
    const icon = document.getElementById('modalIcon');
    const title = document.getElementById('modalTitle');
    const message = document.getElementById('modalMessage');
    const teamBox = document.getElementById('teamInfoBox');
    const teamDisplay = document.getElementById('teamNumberDisplay');
    const topLine = document.getElementById('modalTopLine');
    const closeBtn = document.getElementById('closeModalBtn');

    if (isSuccess) {
        // 성공 스타일 (팀 번호 안내)
        topLine.className = "absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-ai-primary to-ai-secondary";
        iconBox.className = "w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-indigo-100";
        icon.className = "fa-solid fa-face-smile text-3xl text-ai-primary";
        title.innerText = `${name}님 환영합니다!`;
        message.innerText = "아래 배정된 팀 번호를 확인 후 해당 자리로 착석해 주세요.";
        teamBox.classList.remove('hidden');
        teamDisplay.innerText = team;
        closeBtn.className = "w-full py-4 bg-gray-900 text-white font-black text-lg rounded-xl hover:bg-black transition-all flex items-center justify-center gap-2 shadow-lg mb-2";
    } else {
        // 에러/실패 스타일 (빨간색 경고)
        topLine.className = "absolute top-0 left-0 w-full h-2 bg-red-500";
        iconBox.className = "w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-red-100";
        icon.className = "fa-solid fa-circle-exclamation text-3xl text-red-500";
        title.innerText = "확인 불가";
        message.innerHTML = `<span class="font-bold text-red-500">'${name}'</span> 님의 사전 신청 내역을 찾을 수 없습니다.<br>오타가 없는지 확인하시거나 현장 스태프에게 문의해 주세요.`;
        teamBox.classList.add('hidden');
        closeBtn.className = "w-full py-4 bg-gray-100 text-gray-700 font-black text-lg rounded-xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2 mb-2";
    }

    // 모달 애니메이션으로 나타나기
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
      modal.classList.remove('opacity-0');
      modal.classList.add('opacity-100');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    }, 10);
  }

  // 모달 닫기 함수
  function closeModal() {
    const modal = document.getElementById('resultModal');
    const content = document.getElementById('modalContent');
    
    // 모달 애니메이션으로 사라지기
    modal.classList.remove('opacity-100');
    modal.classList.add('opacity-0');
    content.classList.remove('scale-100');
    content.classList.add('scale-95');
    
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      // 다음 사람을 위해 입력창에 포커스
      document.getElementById('userName').focus();
    }, 300);
  }
</script>
</body>
</html>
